services:
  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/bank_app
      - SECRET_KEY=supersecretkey
    depends_on:
      - mongo

  transactions:
    build: ./transactions
    environment:
      - MONGO_URI=mongodb://mongo:27017/bank_app
      - PORT=3000
    ports:
      - "3001:3000"
    depends_on:
      - mongo

  studentportfolio:
    build: ./studentportfolio

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - studentportfolio
      - transactions

volumes:
  mongo_data: